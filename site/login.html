<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>会員登録 / ログイン｜AUC-AGENT</title>
<meta name="description" content="AUC-AGENT 会員登録・ログイン。登録無料、車両提案・シミュレーションまで無料でご利用いただけます。" />
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
<link rel="apple-touch-icon" href="assets/img/favicon-180.png" />
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="index.html">
      <span class="logo">A</span>
      <span>AUC-AGENT<small>CAR AUCTION AGENT</small></span>
    </a>
    <nav class="nav">
      <a class="nav-link" href="index.html#simulator">料金シミュレーション</a>
      <a class="nav-link" href="index.html#price">プラン</a>
      <a class="btn btn-ghost btn-sm" href="index.html">トップへ戻る</a>
    </nav>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="tabs">
      <button id="tabLogin" class="active" type="button">ログイン</button>
      <button id="tabRegister" type="button">無料会員登録</button>
    </div>

    <!-- Login -->
    <form id="formLogin">
      <h1>おかえりなさい</h1>
      <p class="sub">マイページで車両提案・進捗をチェックできます。</p>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="loginPass" placeholder="••••••••" required />
      </div>
      <button class="btn btn-gold btn-block" type="submit">ログイン</button>
      <p class="switch">アカウントをお持ちでない方は <a href="#" id="goRegister">こちら</a></p>
    </form>

    <!-- Register -->
    <form id="formRegister" style="display:none;">
      <h1>無料会員登録</h1>
      <p class="sub">1分で完了。登録・シミュレーション・車両提案まで無料です。</p>
      <div class="field">
        <label>お名前</label>
        <input type="text" id="regName" placeholder="山田 太郎" required />
      </div>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required />
      </div>
      <div class="row-2">
        <div class="field">
          <label>パスワード</label>
          <input type="password" id="regPass" placeholder="8文字以上" required />
        </div>
        <div class="field">
          <label>ご希望プラン</label>
          <select id="regPlan">
            <option value="ライト">ライト（¥30,000）</option>
            <option value="スタンダード" selected>スタンダード（¥45,000）</option>
            <option value="プレミアム">プレミアム（¥69,000）</option>
          </select>
        </div>
      </div>
      <button class="btn btn-gold btn-block" type="submit">無料で登録してマイページへ</button>
      <p class="switch">すでに会員の方は <a href="#" id="goLogin">ログイン</a></p>
    </form>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
  // タブ切り替え
  var tabLogin = document.getElementById("tabLogin");
  var tabRegister = document.getElementById("tabRegister");
  var formLogin = document.getElementById("formLogin");
  var formRegister = document.getElementById("formRegister");

  function show(which) {
    var login = which === "login";
    formLogin.style.display = login ? "block" : "none";
    formRegister.style.display = login ? "none" : "block";
    tabLogin.classList.toggle("active", login);
    tabRegister.classList.toggle("active", !login);
  }
  tabLogin.onclick = function () { show("login"); };
  tabRegister.onclick = function () { show("register"); };
  document.getElementById("goRegister").onclick = function (e) { e.preventDefault(); show("register"); };
  document.getElementById("goLogin").onclick = function (e) { e.preventDefault(); show("login"); };

  // 登録（デモ: localStorage に保存してマイページへ）
  formRegister.addEventListener("submit", function (e) {
    e.preventDefault();
    AucAuth.register({
      name: document.getElementById("regName").value,
      email: document.getElementById("regEmail").value,
      plan: document.getElementById("regPlan").value
    });
    location.href = "mypage.html";
  });

  // ログイン（デモ: 既存があればそれ、無ければゲスト作成）
  formLogin.addEventListener("submit", function (e) {
    e.preventDefault();
    AucAuth.login(document.getElementById("loginEmail").value);
    location.href = "mypage.html";
  });
</script>
</body>
</html>
