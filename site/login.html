<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>会員登録 / ログイン｜AUC-AGENT</title>
<meta name="description" content="AUC-AGENT 会員登録・ログイン。登録無料、車両提案・シミュレーションまで無料でご利用いただけます。" />
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
<link rel="apple-touch-icon" href="assets/img/favicon-180.png" />
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="index.html">
      <span class="logo">A</span>
      <span>AUC-AGENT<small>CAR AUCTION AGENT</small></span>
    </a>
    <nav class="nav">
      <a class="nav-link" href="index.html#simulator">料金シミュレーション</a>
      <a class="nav-link" href="index.html#price">プラン</a>
      <button class="theme-toggle" id="themeToggle" aria-label="ダークモード切替" title="ダークモード切替">🌙</button>
      <a class="btn btn-ghost btn-sm" href="index.html">トップへ戻る</a>
    </nav>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="tabs">
      <button id="tabLogin" class="active" type="button">ログイン</button>
      <button id="tabRegister" type="button">無料会員登録</button>
    </div>

    <!-- Login -->
    <form id="formLogin">
      <h1>おかえりなさい</h1>
      <p class="sub">マイページで車両提案・進捗をチェックできます。</p>

      <button type="button" class="btn btn-google btn-block" id="googleLoginBtn" style="margin-bottom:8px;">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Googleでログイン
      </button>

      <div class="divider">または</div>

      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="loginPass" placeholder="••••••••" required />
      </div>
      <div id="loginError" class="alert" style="display:none;background:#fdeaea;color:#d44b4b;border:1px solid #f5c6c6;"></div>
      <button class="btn btn-gold btn-block" type="submit">ログイン</button>
      <p class="switch">アカウントをお持ちでない方は <a href="#" id="goRegister">こちら</a></p>
    </form>

    <!-- Register -->
    <form id="formRegister" style="display:none;">
      <h1>無料会員登録</h1>
      <p class="sub">1分で完了。登録・シミュレーション・車両提案まで無料です。</p>

      <button type="button" class="btn btn-google btn-block" id="googleRegBtn" style="margin-bottom:8px;">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Googleで登録
      </button>

      <div class="divider">または</div>

      <div class="field">
        <label>お名前</label>
        <input type="text" id="regName" placeholder="山田 太郎" required />
      </div>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required />
      </div>
      <div class="row-2">
        <div class="field">
          <label>パスワード</label>
          <input type="password" id="regPass" placeholder="8文字以上" minlength="8" required />
        </div>
        <div class="field">
          <label>ご希望プラン</label>
          <select id="regPlan">
            <option value="ライト">ライト（¥30,000）</option>
            <option value="スタンダード" selected>スタンダード（¥45,000）</option>
            <option value="プレミアム">プレミアム（¥69,000）</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>紹介コード（お持ちの方）</label>
        <input type="text" id="regReferral" placeholder="例）AUC-XXXXXX" style="text-transform:uppercase;" />
      </div>
      <div id="regError" class="alert" style="display:none;background:#fdeaea;color:#d44b4b;border:1px solid #f5c6c6;"></div>
      <button class="btn btn-gold btn-block" type="submit">無料で登録してマイページへ</button>
      <p class="switch">すでに会員の方は <a href="#" id="goLogin">ログイン</a></p>
    </form>
  </div>
</div>

<!-- Firebase SDK (設定が入っている場合のみ動作) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/app.js"></script>
<script>
  // ダークモード
  (function () {
    var saved = localStorage.getItem('auc_theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = saved || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    var btn = document.getElementById('themeToggle');
    if (btn) {
      btn.textContent = theme === 'dark' ? '☀️' : '🌙';
      btn.addEventListener('click', function () {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('auc_theme', next);
        btn.textContent = next === 'dark' ? '☀️' : '🌙';
      });
    }
  })();

  var useFirebase = AucFirebase.init();

  // タブ切り替え
  var tabLogin = document.getElementById("tabLogin");
  var tabRegister = document.getElementById("tabRegister");
  var formLogin = document.getElementById("formLogin");
  var formRegister = document.getElementById("formRegister");

  function show(which) {
    var login = which === "login";
    formLogin.style.display = login ? "block" : "none";
    formRegister.style.display = login ? "none" : "block";
    tabLogin.classList.toggle("active", login);
    tabRegister.classList.toggle("active", !login);
    hideErrors();
  }
  function hideErrors() {
    document.getElementById("loginError").style.display = "none";
    document.getElementById("regError").style.display = "none";
  }
  function showError(id, msg) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = "block";
  }

  tabLogin.onclick = function () { show("login"); };
  tabRegister.onclick = function () { show("register"); };
  document.getElementById("goRegister").onclick = function (e) { e.preventDefault(); show("register"); };
  document.getElementById("goLogin").onclick = function (e) { e.preventDefault(); show("login"); };

  // Google ログイン
  function handleGoogle() {
    if (!useFirebase) {
      AucAuth.login("google-user@example.com");
      location.href = "mypage.html";
      return;
    }
    AucFirebase.loginWithGoogle().then(function (res) {
      if (res.ok) {
        location.href = "mypage.html";
      } else {
        showError("loginError", res.error);
      }
    });
  }
  document.getElementById("googleLoginBtn").onclick = handleGoogle;
  document.getElementById("googleRegBtn").onclick = handleGoogle;

  // 登録
  formRegister.addEventListener("submit", function (e) {
    e.preventDefault();
    hideErrors();
    var name = document.getElementById("regName").value;
    var email = document.getElementById("regEmail").value;
    var pass = document.getElementById("regPass").value;
    var plan = document.getElementById("regPlan").value;

    if (pass.length < 8) {
      showError("regError", "パスワードは8文字以上で入力してください。");
      return;
    }

    var referralCode = (document.getElementById("regReferral").value || "").trim().toUpperCase();

    function applyReferralAfterReg() {
      if (referralCode && referralCode.indexOf("AUC-") === 0) {
        AucAuth.applyReferralCode(referralCode);
      }
    }

    if (useFirebase) {
      AucFirebase.register(name, email, pass, plan).then(function (res) {
        if (res.ok) {
          applyReferralAfterReg();
          location.href = "mypage.html";
        } else {
          var msg = res.error;
          if (msg.indexOf("email-already-in-use") >= 0) msg = "このメールアドレスは既に登録されています。";
          else if (msg.indexOf("weak-password") >= 0) msg = "パスワードが短すぎます。8文字以上にしてください。";
          else if (msg.indexOf("invalid-email") >= 0) msg = "メールアドレスの形式が正しくありません。";
          showError("regError", msg);
        }
      });
    } else {
      AucAuth.register({ name: name, email: email, plan: plan });
      applyReferralAfterReg();
      location.href = "mypage.html";
    }
  });

  // ログイン
  formLogin.addEventListener("submit", function (e) {
    e.preventDefault();
    hideErrors();
    var email = document.getElementById("loginEmail").value;
    var pass = document.getElementById("loginPass").value;

    if (useFirebase) {
      AucFirebase.login(email, pass).then(function (res) {
        if (res.ok) {
          location.href = "mypage.html";
        } else {
          var msg = res.error;
          if (msg.indexOf("user-not-found") >= 0 || msg.indexOf("invalid-credential") >= 0) msg = "メールアドレスまたはパスワードが正しくありません。";
          else if (msg.indexOf("wrong-password") >= 0) msg = "パスワードが正しくありません。";
          else if (msg.indexOf("too-many-requests") >= 0) msg = "ログイン試行回数が多すぎます。しばらくしてからお試しください。";
          showError("loginError", msg);
        }
      });
    } else {
      AucAuth.login(email);
      location.href = "mypage.html";
    }
  });
</script>
</body>
</html>
