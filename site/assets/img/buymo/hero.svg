<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440" role="img" aria-label="車買取のイメージ（差し替え用プレースホルダー）">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF7EF"/><stop offset="1" stop-color="#FFE9D6"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4DA3FF"/><stop offset="1" stop-color="#2F77D8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="440" rx="24" fill="url(#sky)"/>
  <circle cx="500" cy="90" r="46" fill="#FFD700" opacity=".85"/>
  <!-- ground -->
  <ellipse cx="300" cy="360" rx="250" ry="34" fill="#FF6B35" opacity=".10"/>
  <!-- car -->
  <g>
    <rect x="120" y="232" width="360" height="78" rx="30" fill="url(#body)"/>
    <path d="M180 232 q40 -70 120 -70 q90 0 120 70 Z" fill="url(#body)"/>
    <path d="M205 228 q30 -46 95 -46 q70 0 95 46 Z" fill="#DCEBFF"/>
    <line x1="300" y1="184" x2="300" y2="228" stroke="#2F77D8" stroke-width="4"/>
    <circle cx="205" cy="312" r="34" fill="#2A2F3A"/><circle cx="205" cy="312" r="15" fill="#9AA3B2"/>
    <circle cx="395" cy="312" r="34" fill="#2A2F3A"/><circle cx="395" cy="312" r="15" fill="#9AA3B2"/>
    <rect x="455" y="250" width="24" height="20" rx="6" fill="#FFD700"/>
  </g>
  <!-- caption -->
  <text x="300" y="408" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="15" fill="#B79B82">ヒーロー画像（差し替え用プレースホルダー）</text>
</svg>
