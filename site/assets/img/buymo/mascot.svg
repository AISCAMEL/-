<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="BUYMOマスコット（差し替え用プレースホルダー）">
  <circle cx="100" cy="100" r="96" fill="#FFFFFF" stroke="#FF6B35" stroke-width="4"/>
  <!-- horns -->
  <path d="M58 66 q-14 -20 4 -30 q10 8 12 24Z" fill="#E9D8C3"/>
  <path d="M142 66 q14 -20 -4 -30 q-10 8 -12 24Z" fill="#E9D8C3"/>
  <!-- ears -->
  <ellipse cx="52" cy="92" rx="20" ry="13" fill="#D8A06A" transform="rotate(-20 52 92)"/>
  <ellipse cx="148" cy="92" rx="20" ry="13" fill="#D8A06A" transform="rotate(20 148 92)"/>
  <!-- head -->
  <ellipse cx="100" cy="100" rx="52" ry="46" fill="#E8B07A"/>
  <ellipse cx="78" cy="84" rx="14" ry="11" fill="#C98A4E"/>
  <!-- eyes -->
  <circle cx="82" cy="96" r="6" fill="#2A2F3A"/><circle cx="118" cy="96" r="6" fill="#2A2F3A"/>
  <!-- muzzle -->
  <ellipse cx="100" cy="128" rx="34" ry="24" fill="#F4DCC4"/>
  <circle cx="88" cy="128" r="4" fill="#9A6A3A"/><circle cx="112" cy="128" r="4" fill="#9A6A3A"/>
  <text x="100" y="182" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#B79B82">mascot</text>
</svg>
