<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Noto Sans JP','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1b33"/>
      <stop offset="1" stop-color="#16294a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0bd6a"/>
      <stop offset="1" stop-color="#c9a14a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#gold)"/>
  <g transform="translate(96,96)">
    <rect x="0" y="0" width="96" height="96" rx="20" fill="#0b1730" stroke="#c9a14a" stroke-width="2"/>
    <text x="48" y="70" font-size="58" font-weight="900" fill="url(#gold)" text-anchor="middle">バ</text>
    <text x="120" y="48" font-size="34" font-weight="800" fill="#fff" letter-spacing="1">バイモダイレクト</text>
    <text x="121" y="80" font-size="16" font-weight="600" fill="#c9a14a" letter-spacing="4">CAR AUCTION AGENT ／ 合同会社アイズ</text>
  </g>
  <text x="96" y="330" font-size="60" font-weight="900" fill="#fff">欲しい車を、<tspan fill="#e0bd6a">相場よりおトク</tspan>に。</text>
  <text x="96" y="408" font-size="40" font-weight="800" fill="#fff">プロが代わりに<tspan fill="#e0bd6a">入札・落札・出品</tspan>します。</text>
  <text x="96" y="486" font-size="26" font-weight="500" fill="#d4dcec">業者オートオークション代行／総額シミュレーション／会員サイト</text>
  <g transform="translate(96,520)">
