    <text x="150" y="35" font-size="22" font-weight="800" fill="#0e1b33" text-anchor="middle">無料シミュレーション</text>
    <text x="330" y="35" font-size="20" font-weight="600" fill="#9fb0cc">福島県いわき市｜全国対応</text>
