<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="BUYMO 車買取">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#FFE8D6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="80" r="120" fill="#FFD700" opacity=".5"/>
  <rect x="0" y="0" width="1200" height="14" fill="#FF6B35"/>

  <!-- ロゴ -->
  <g transform="translate(90,120)">
    <rect width="92" height="92" rx="20" fill="#FF6B35"/>
    <ellipse cx="46" cy="50" rx="27" ry="24" fill="#F4DCC4"/>
    <circle cx="38" cy="46" r="4" fill="#3A2A1A"/><circle cx="56" cy="46" r="4" fill="#3A2A1A"/>
    <ellipse cx="46" cy="64" rx="17" ry="11" fill="#FFFFFF"/>
    <circle cx="40" cy="64" r="2.4" fill="#C98A4E"/><circle cx="52" cy="64" r="2.4" fill="#C98A4E"/>
    <text x="112" y="74" font-family="'Noto Sans JP',sans-serif" font-size="64" font-weight="900" fill="#FF6B35">BUYMO</text>
  </g>

  <!-- キャッチ -->
  <text x="90" y="320" font-family="'Noto Sans JP',sans-serif" font-size="42" font-weight="700" fill="#1E3A8A">どこよりも高く、早く、手間なく！</text>
  <text x="90" y="406" font-family="'Noto Sans JP',sans-serif" font-size="72" font-weight="900" fill="#333333">あなたの愛車を<tspan fill="#FF6B35">高価買取</tspan></text>

  <!-- バッジ -->
  <g font-family="'Noto Sans JP',sans-serif" font-size="26" font-weight="700">
    <rect x="90" y="470" width="190" height="56" rx="28" fill="#fff" stroke="#FF6B35" stroke-width="2"/>
    <text x="185" y="507" fill="#FF6B35" text-anchor="middle">査定無料</text>
    <rect x="300" y="470" width="190" height="56" rx="28" fill="#fff" stroke="#FF6B35" stroke-width="2"/>
    <text x="395" y="507" fill="#FF6B35" text-anchor="middle">手数料0円</text>
    <rect x="510" y="470" width="240" height="56" rx="28" fill="#fff" stroke="#FF6B35" stroke-width="2"/>
    <text x="630" y="507" fill="#FF6B35" text-anchor="middle">全国47都道府県</text>
  </g>

  <!-- 車＋マスコット -->
  <g transform="translate(820,330)">
    <ellipse cx="170" cy="170" rx="180" ry="30" fill="#FF6B35" opacity=".10"/>
    <rect x="40" y="92" width="250" height="56" rx="22" fill="#3B82F6"/>
    <path d="M85 92 q30 -50 80 -50 q60 0 80 50 Z" fill="#3B82F6"/>
    <path d="M103 90 q22 -34 62 -34 q46 0 62 34 Z" fill="#DCEBFF"/>
    <circle cx="100" cy="150" r="26" fill="#2A2F3A"/><circle cx="100" cy="150" r="11" fill="#9AA3B2"/>
    <circle cx="232" cy="150" r="26" fill="#2A2F3A"/><circle cx="232" cy="150" r="11" fill="#9AA3B2"/>
    <g transform="translate(250,40)">
      <ellipse cx="40" cy="44" rx="34" ry="30" fill="#F4DCC4"/>
      <circle cx="30" cy="40" r="4.5" fill="#3A2A1A"/><circle cx="50" cy="40" r="4.5" fill="#3A2A1A"/>
      <ellipse cx="40" cy="58" rx="20" ry="13" fill="#fff"/>
    </g>
  </g>
  <text x="600" y="600" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="22" fill="#9a7b60">事故車・不動車・廃車もOK／無料出張査定・最短即日入金</text>
</svg>
