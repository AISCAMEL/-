  <g><circle cx="120" cy="866" r="17" fill="#0e1b33"/><text x="120" y="872" font-size="14" font-weight="900" fill="#e0bd6a" text-anchor="middle">1</text><text x="120" y="906" font-size="12.5" font-weight="700" fill="#0e1b33" text-anchor="middle">ご相談</text></g><g><circle cx="304.66666666666663" cy="866" r="17" fill="#0e1b33"/><text x="304.66666666666663" y="872" font-size="14" font-weight="900" fill="#e0bd6a" text-anchor="middle">2</text><text x="304.66666666666663" y="906" font-size="12.5" font-weight="700" fill="#0e1b33" text-anchor="middle">車両を探索</text></g><g><circle cx="489.3333333333333" cy="866" r="17" fill="#0e1b33"/><text x="489.3333333333333" y="872" font-size="14" font-weight="900" fill="#e0bd6a" text-anchor="middle">3</text><text x="489.3333333333333" y="906" font-size="12.5" font-weight="700" fill="#0e1b33" text-anchor="middle">入札・落札</text></g><g><circle cx="674" cy="866" r="17" fill="#0e1b33"/><text x="674" y="872" font-size="14" font-weight="900" fill="#e0bd6a" text-anchor="middle">4</text><text x="674" y="906" font-size="12.5" font-weight="700" fill="#0e1b33" text-anchor="middle">納車</text></g>

