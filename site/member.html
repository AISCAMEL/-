<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>会員マイページ｜BUYMO</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" />
<link rel="stylesheet" href="assets/css/buymo.css" />
<style>
  .mp-header{background:var(--navy);color:#fff;height:64px;display:flex;align-items:center;}
  .mp-header .container{display:flex;align-items:center;gap:16px;width:100%;}
  .mp-header .logo{color:#fff;font-size:22px;}
  .mp-header .mp-h-title{font-weight:700;font-size:16px;}
  .mp-header .mp-logout{margin-left:auto;color:#cdd6ee;font-weight:700;font-size:14px;}
  .mp-main{background:var(--gray);min-height:calc(100vh - 64px);padding:32px 0 60px;}
  .mp-card{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:32px;max-width:560px;margin:0 auto;}
  .mp-card h1{font-size:22px;font-weight:900;margin-bottom:6px;text-align:center;}
  .mp-card .mp-lead{color:#666;font-size:14px;text-align:center;margin-bottom:22px;}
  .mp-field{margin-bottom:16px;}
  .mp-field label{display:block;font-weight:700;font-size:14px;margin-bottom:6px;}
  .mp-field input{width:100%;height:50px;border:1px solid #ddd;border-radius:8px;padding:0 14px;font-size:16px;font-family:inherit;}
  .mp-field input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,53,.15);}
  .mp-err{color:#e53935;font-size:13px;min-height:18px;}
  .mp-greet{max-width:720px;margin:0 auto 18px;}
  .mp-greet h1{font-size:22px;font-weight:900;}
  .mp-greet p{color:#666;font-size:14px;}
  #caseList{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:18px;}
  .mp-case{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:24px;}
  .mp-case-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .mp-id{font-size:12px;color:#999;font-weight:700;}
  .mp-tag{background:#FFF1E6;color:var(--orange);font-size:12px;font-weight:700;border-radius:6px;padding:2px 10px;}
  .mp-stage{margin-left:auto;background:var(--orange);color:#fff;font-weight:700;font-size:13px;border-radius:30px;padding:4px 14px;}
  .mp-stepper{display:flex;justify-content:space-between;position:relative;margin:0 0 14px;}
  .mp-stepper::before{content:"";position:absolute;top:9px;left:6%;right:6%;height:3px;background:#e3e3e3;z-index:0;}
  .mp-stepper li{list-style:none;position:relative;z-index:1;text-align:center;flex:1;}
  .mp-dot{display:block;width:20px;height:20px;border-radius:50%;background:#d8d8d8;margin:0 auto 8px;border:3px solid var(--gray);}
  .mp-stepper li.done .mp-dot{background:#2e9e44;}
  .mp-stepper li.current .mp-dot{background:var(--orange);box-shadow:0 0 0 4px rgba(255,107,53,.25);}
  .mp-step-label{font-size:11px;color:#888;font-weight:700;}
  .mp-stepper li.current .mp-step-label{color:var(--orange);}
  .mp-amount{font-size:14px;color:#555;border-top:1px solid #eee;padding-top:12px;}
  .mp-amount strong{color:var(--orange);font-size:18px;}
  .mp-empty{text-align:center;color:#666;padding:30px 0;}
  .mp-empty .btn{margin-top:14px;}
  .mp-actions{max-width:720px;margin:22px auto 0;text-align:center;}
</style>
</head>
<body>

<header class="mp-header">
  <div class="container">
    <a href="buymo.html" class="logo"><span aria-hidden="true">🐮</span> BUYMO</a>
    <span class="mp-h-title">会員マイページ</span>
    <a href="#" class="mp-logout" id="memberLogout" style="display:none">ログアウト</a>
  </div>
</header>

<main class="mp-main">
  <div class="container">

    <!-- ログイン/登録 -->
    <div id="memberLogin">
      <div class="mp-card">
        <h1>会員マイページ</h1>
        <p class="mp-lead">ご登録のメールアドレスで、査定状況・買取の進捗をご確認いただけます。</p>
        <form id="memberForm" novalidate>
          <div class="mp-field">
            <label for="mName">お名前（任意）</label>
            <input type="text" id="mName" placeholder="例：山田 太郎" />
          </div>
          <div class="mp-field">
            <label for="mEmail">メールアドレス</label>
            <input type="email" id="mEmail" placeholder="例：example@buymo.jp" required />
          </div>
          <p class="mp-err" id="mErr"></p>
          <button type="submit" class="btn btn-primary btn-block btn-lg">ログイン／登録</button>
        </form>
      </div>
    </div>

    <!-- ダッシュボード -->
    <div id="memberDash" style="display:none">
      <div class="mp-greet">
        <h1 id="memberName">お客様</h1>
        <p>登録メール：<span id="memberEmail"></span>／査定状況は随時更新されます。</p>
      </div>
      <div id="caseList"></div>
      <div class="mp-actions">
        <a href="buymo-contact.html" class="btn btn-primary">別の車も査定を依頼する</a>
      </div>
    </div>

  </div>
</main>

<script src="assets/js/member.js" defer></script>
</body>
</html>
