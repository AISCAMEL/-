<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>お知らせ管理｜BUYMO 本部</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" />
<link rel="stylesheet" href="assets/css/buymo.css" />
<link rel="stylesheet" href="assets/css/board.css" />
<link rel="stylesheet" href="assets/css/academy.css" />
</head>
<body>
<script src="assets/js/auth.js"></script><script>AUTH.guard("hq");</script>
<header class="portal-header">
  <div class="container">
    <a href="portal-login.html" class="logo"><span aria-hidden="true">🐮</span> BUYMO</a>
    <span class="portal-title">本部</span>
    <nav class="portal-nav" id="hqNav"></nav>
    <a href="portal-login.html" class="portal-logout">ログアウト</a>
  </div>
</header>

<main class="portal-main">
  <div class="container">
    <h1>お知らせ管理（本部→加盟店）</h1>
    <p class="portal-sub">投稿すると、加盟店の各ページ上部にバナーで表示されます。</p>

    <div class="add-bar">
      <form id="noticeForm">
        <input class="ac-name" id="nTitle" type="text" placeholder="タイトル（必須）" />
        <select id="nLevel"><option value="info">お知らせ</option><option value="warn">重要</option></select>
        <input id="nBody" type="text" placeholder="本文（必須）" style="flex:2;min-width:200px;" />
        <button type="submit" class="btn btn-primary">投稿する</button>
      </form>
    </div>

    <div id="noticeList" class="notice-admin"></div>
  </div>
</main>

<script src="assets/js/hq-common.js"></script>
<script>
  HQ.nav('notices');
  function nowStr(){var d=new Date();function p(n){return('0'+n).slice(-2);}return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate());}
  function render(){
    var a=HQ.getNotices();
    document.getElementById('noticeList').innerHTML = a.length ? a.map(function(n){
      return '<div class="na-card '+(n.lv||'info')+'"><div class="na-head"><span class="na-lv">'+(n.lv==='warn'?'重要':'お知らせ')+'</span><strong>'+HQ.esc(n.t)+'</strong><span class="na-date">'+HQ.esc(n.date||'')+'</span>'+
        '<button class="na-del" data-id="'+HQ.esc(n.id)+'">削除</button></div><p>'+HQ.esc(n.b)+'</p></div>';
    }).join('') : '<p class="alert-none">お知らせはまだありません。</p>';
  }
  document.getElementById('noticeForm').addEventListener('submit',function(e){
    e.preventDefault();
    var t=document.getElementById('nTitle').value.trim(); var b=document.getElementById('nBody').value.trim();
    if(!t||!b)return;
    HQ.addNotice({id:'N-'+Date.now().toString().slice(-6),t:t,b:b,lv:document.getElementById('nLevel').value,date:nowStr()});
    e.target.reset(); render();
  });
  document.getElementById('noticeList').addEventListener('click',function(e){
    var b=e.target.closest('.na-del'); if(!b)return;
    HQ.deleteNotice(b.getAttribute('data-id')); render();
  });
  render();
</script>
</body>
</html>
