<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WP申込 送信テスト</title>
<style>
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',Meiryo,sans-serif;background:#f1f5f9;color:#1e293b;margin:0;padding:24px;line-height:1.7;}
  .card{max-width:640px;margin:0 auto;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:28px 24px;box-shadow:0 4px 12px rgba(0,0,0,.05);}
  h1{font-size:20px;color:#1a2744;margin:0 0 6px;}
  .sub{font-size:13px;color:#64748b;margin:0 0 20px;}
  .url{font-size:12px;word-break:break-all;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#475569;margin-bottom:20px;}
  button{width:100%;min-height:56px;border:0;border-radius:999px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(37,99,235,.3);}
  button:hover{filter:brightness(1.05);}
  button:disabled{opacity:.6;cursor:not-allowed;}
  .result{margin-top:20px;padding:16px;border-radius:10px;font-size:14px;display:none;white-space:pre-wrap;word-break:break-all;}
  .ok{background:#f0fdf4;border:1.5px solid #bbf7d0;color:#15803d;display:block;}
  .ng{background:#fef2f2;border:1.5px solid #fecaca;color:#b91c1c;display:block;}
  .hint{font-size:13px;color:#64748b;margin-top:18px;line-height:1.8;}
  code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px;}
</style>
</head>
<body>
<div class="card">
  <h1>WP申込フォーム 送信テスト</h1>
  <p class="sub">下のボタンを押すと、テストの申込データをGAS（スプレッドシート）へ送ります。</p>

  <div class="url" id="url"></div>

  <button id="btn">テスト送信する</button>

  <div class="result" id="result"></div>

  <p class="hint">
    ✅ 成功したら、スプレッドシートの <code>WP申込</code> タブに<br>
    「テスト太郎（送信テスト）」の行が増えているはずです。<br><br>
    ※このページはお客様のパソコンで開いて使うテスト専用です。
  </p>
</div>

<script>
/* ▼ 送信先（発行済みの /exec URL） */
var ENDPOINT = "https://script.google.com/macros/s/AKfycbw9wL1j6ywXQO31-CTJ8vfQUGcER-SQPYOCmiY-6deHez5avY-g82vFwepsHKKs6q15CQ/exec";

document.getElementById('url').textContent = '送信先： ' + ENDPOINT;

var btn = document.getElementById('btn');
var result = document.getElementById('result');

btn.addEventListener('click', function(){
  btn.disabled = true;
  var old = btn.textContent;
  btn.textContent = '送信中…';
  result.className = 'result';
  result.style.display = 'none';

  var payload = {
    source: 'test-endpoint.html',
    submittedAt: new Date().toISOString(),
    hp: '',
    meta: { name:'山田太郎（フルテスト）', kana:'ヤマダタロウ', phone:'090-1234-5678', email:'taro.yamada@example.com', car:'トヨタ アクア' },
    fields: [
      { section:'STEP1 ご希望のお車', label:'ご希望のお車は決まっていますか？', value:'決まっている' },
      { section:'STEP1 ご希望のお車', label:'ご予算（車両価格）', value:'〜150万円' },
      { section:'STEP1 ご希望のお車', label:'ご希望の納車時期', value:'1ヶ月以内' },
      { section:'STEP1 ご希望のお車', label:'メーカー', value:'トヨタ' },
      { section:'STEP1 ご希望のお車', label:'ご希望車種', value:'アクア' },
      { section:'STEP1 ご希望のお車', label:'ご希望カラー', value:'パールホワイト' },
      { section:'STEP1 ご希望のお車', label:'ご利用用途', value:'自家用' },
      { section:'STEP1 ご希望のお車', label:'ご希望の装備（複数選択可）', value:'ナビ、バックカメラ、ETC' },
      { section:'STEP2 申込のきっかけ・ご状況', label:'何を見てお申し込み？', value:'ホームページ' },
      { section:'STEP2 申込のきっかけ・ご状況', label:'現在のご事情', value:'買い替え' },
      { section:'STEP2 申込のきっかけ・ご状況', label:'今いちばん不安なこと', value:'審査に通るか' },
      { section:'STEP3 ご本人情報', label:'お名前', value:'山田太郎（フルテスト）' },
      { section:'STEP3 ご本人情報', label:'フリガナ', value:'ヤマダタロウ' },
      { section:'STEP3 ご本人情報', label:'生年月日', value:'1990-05-15' },
      { section:'STEP3 ご本人情報', label:'性別', value:'男性' },
      { section:'STEP3 ご本人情報', label:'婚姻状況', value:'既婚' },
      { section:'STEP3 ご本人情報', label:'国籍', value:'日本' },
      { section:'STEP3 ご本人情報', label:'運転免許証', value:'あり（普通）' },
      { section:'STEP3 ご本人情報', label:'携帯電話', value:'090-1234-5678' },
      { section:'STEP3 ご本人情報', label:'メールアドレス', value:'taro.yamada@example.com' },
      { section:'STEP3 ご本人情報', label:'ご希望の連絡方法', value:'LINE' },
      { section:'STEP3 ご本人情報', label:'ご連絡可能な時間', value:'18-21時' },
      { section:'STEP4 現住所', label:'郵便番号', value:'9700101' },
      { section:'STEP4 現住所', label:'居住形態', value:'持家（本人名義）' },
      { section:'STEP4 現住所', label:'ご住所', value:'福島県いわき市平1-2-3' },
      { section:'STEP4 現住所', label:'居住年数', value:'5年' },
      { section:'STEP5 ご家族・生計', label:'扶養家族の人数', value:'2人' },
      { section:'STEP5 ご家族・生計', label:'主たる生計者', value:'本人' },
      { section:'STEP6 ご収入', label:'年収（額面・円）', value:'4500000' },
      { section:'STEP6 ご収入', label:'月収（手取り目安・円）', value:'280000' },
      { section:'STEP6 ご収入', label:'給与形態', value:'月給' },
      { section:'STEP6 ご収入', label:'賞与（ボーナス）', value:'あり（年2回）' },
      { section:'STEP7 お勤め先・就労形態', label:'就労形態', value:'正社員' },
      { section:'STEP7 お勤め先・就労形態', label:'会社名・屋号', value:'株式会社サンプル' },
      { section:'STEP7 お勤め先・就労形態', label:'業種', value:'製造' },
      { section:'STEP7 お勤め先・就労形態', label:'勤続・営業年数', value:'5年' },
      { section:'STEP7 お勤め先・就労形態', label:'職種', value:'技術・専門職' },
      { section:'STEP8 現在のお車', label:'今回のご購入は', value:'乗り替え（今の車を手放す）' },
      { section:'STEP9 お支払いのご希望', label:'頭金', value:'なし' },
      { section:'STEP9 お支払いのご希望', label:'月々のご希望', value:'3〜3.5万円' },
      { section:'STEP9 お支払いのご希望', label:'希望支払い回数', value:'60回(5年)' },
      { section:'STEP9 お支払いのご希望', label:'支払いイメージ', value:'均等払い' },
      { section:'STEP10 与信・お借入の状況', label:'審査のお申込みは何社目？', value:'1社目（初めて）' },
      { section:'STEP10 与信・お借入の状況', label:'他社お借入の件数', value:'1社' },
      { section:'STEP10 与信・お借入の状況', label:'任意保険', value:'加入中' },
      { section:'STEP11 信用情報の状況', label:'債務整理の経験', value:'なし' },
      { section:'STEP11 信用情報の状況', label:'自己破産の経験', value:'なし' },
      { section:'STEP12 保証人・緊急連絡先', label:'保証人', value:'いいえ' },
      { section:'STEP13 保管場所・使用者・納車先', label:'お車の保管場所', value:'自宅の敷地内（車庫・駐車スペース）' },
      { section:'STEP13 保管場所・使用者・納車先', label:'お車の主な使用者', value:'申込者ご本人' },
      { section:'STEP14 本人確認・必要書類', label:'お申込み区分', value:'個人' },
      { section:'STEP14 本人確認・必要書類', label:'申込住所は運転免許証と同じですか？', value:'同じ' }
    ],
    consent: true,
    files: [
      { label:'運転免許証（表）', name:'test-front.png', mime:'image/png', dataBase64:'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' },
      { label:'運転免許証（裏）', name:'test-back.png', mime:'image/png', dataBase64:'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' }
    ]
  };

  fetch(ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.text(); })
  .then(function(t){
    var ok = false, msg = t;
    try { var j = JSON.parse(t); ok = !!(j.success || j.ok); msg = JSON.stringify(j); } catch(e){}
    if (ok) {
      result.className = 'result ok';
      result.textContent = '✅ 成功しました！\nスプレッドシートの「WP申込」タブを確認してください。\n\n応答：' + msg;
    } else {
      result.className = 'result ng';
      result.textContent = '⚠️ 応答は届きましたが success ではありません。\n\n応答：' + msg;
    }
    btn.disabled = false; btn.textContent = old;
  })
  .catch(function(err){
    result.className = 'result ng';
    result.textContent = '⚠️ 応答の受け取りでエラーが出ました（送信自体は届いている可能性があります）。\n' +
      'スプレッドシートの「WP申込」タブに行が増えているか確認してください。\n\nエラー：' + err;
    btn.disabled = false; btn.textContent = old;
  });
});
</script>
</body>
</html>
