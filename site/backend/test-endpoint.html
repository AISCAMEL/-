<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WP申込 送信テスト</title>
<style>
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',Meiryo,sans-serif;background:#f1f5f9;color:#1e293b;margin:0;padding:24px;line-height:1.7;}
  .card{max-width:640px;margin:0 auto;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:28px 24px;box-shadow:0 4px 12px rgba(0,0,0,.05);}
  h1{font-size:20px;color:#1a2744;margin:0 0 6px;}
  .sub{font-size:13px;color:#64748b;margin:0 0 20px;}
  .url{font-size:12px;word-break:break-all;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;color:#475569;margin-bottom:20px;}
  button{width:100%;min-height:56px;border:0;border-radius:999px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px rgba(37,99,235,.3);}
  button:hover{filter:brightness(1.05);}
  button:disabled{opacity:.6;cursor:not-allowed;}
  .result{margin-top:20px;padding:16px;border-radius:10px;font-size:14px;display:none;white-space:pre-wrap;word-break:break-all;}
  .ok{background:#f0fdf4;border:1.5px solid #bbf7d0;color:#15803d;display:block;}
  .ng{background:#fef2f2;border:1.5px solid #fecaca;color:#b91c1c;display:block;}
  .hint{font-size:13px;color:#64748b;margin-top:18px;line-height:1.8;}
  code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px;}
</style>
</head>
<body>
<div class="card">
  <h1>WP申込フォーム 送信テスト</h1>
  <p class="sub">下のボタンを押すと、テストの申込データをGAS（スプレッドシート）へ送ります。</p>

  <div class="url" id="url"></div>

  <button id="btn">テスト送信する</button>

  <div class="result" id="result"></div>

  <p class="hint">
    ✅ 成功したら、スプレッドシートの <code>WP申込</code> タブに<br>
    「テスト太郎（送信テスト）」の行が増えているはずです。<br><br>
    ※このページはお客様のパソコンで開いて使うテスト専用です。
  </p>
</div>

<script>
/* ▼ 送信先（発行済みの /exec URL） */
var ENDPOINT = "https://script.google.com/macros/s/AKfycbw4e-3mXhAa-RkXbNc2il3b0xYuEMUJnSjzJyhV7yEOImbsuNl-NceIoBuUpoJoVVaQYA/exec";

document.getElementById('url').textContent = '送信先： ' + ENDPOINT;

var btn = document.getElementById('btn');
var result = document.getElementById('result');

btn.addEventListener('click', function(){
  btn.disabled = true;
  var old = btn.textContent;
  btn.textContent = '送信中…';
  result.className = 'result';
  result.style.display = 'none';

  var payload = {
    source: 'test-endpoint.html',
    submittedAt: new Date().toISOString(),
    hp: '',
    meta: { name:'テスト太郎（送信テスト）', kana:'テストタロウ', phone:'09000000000', email:'test@example.com', car:'トヨタ アクア' },
    fields: [
      { section:'STEP1 ご希望のお車', label:'ご希望車種', value:'アクア' },
      { section:'STEP3 ご本人情報', label:'お名前', value:'テスト太郎（送信テスト）' },
      { section:'STEP9 お支払いのご希望', label:'希望支払い回数', value:'60回(5年)' }
    ],
    consent: true,
    files: [
      { label:'運転免許証（表）', name:'test-front.png', mime:'image/png', dataBase64:'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' },
      { label:'運転免許証（裏）', name:'test-back.png', mime:'image/png', dataBase64:'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' }
    ]
  };

  fetch(ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.text(); })
  .then(function(t){
    var ok = false, msg = t;
    try { var j = JSON.parse(t); ok = !!(j.success || j.ok); msg = JSON.stringify(j); } catch(e){}
    if (ok) {
      result.className = 'result ok';
      result.textContent = '✅ 成功しました！\nスプレッドシートの「WP申込」タブを確認してください。\n\n応答：' + msg;
    } else {
      result.className = 'result ng';
      result.textContent = '⚠️ 応答は届きましたが success ではありません。\n\n応答：' + msg;
    }
    btn.disabled = false; btn.textContent = old;
  })
  .catch(function(err){
    result.className = 'result ng';
    result.textContent = '⚠️ 応答の受け取りでエラーが出ました（送信自体は届いている可能性があります）。\n' +
      'スプレッドシートの「WP申込」タブに行が増えているか確認してください。\n\nエラー：' + err;
    btn.disabled = false; btn.textContent = old;
  });
});
</script>
</body>
</html>
