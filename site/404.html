<style>
  .nf{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;

  .nf p{color:#666;margin-bottom:24px;}
  .nf-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

  .nf-links .btn{width:auto;padding:0 26px;height:52px;}
  .nf-nav{margin-top:26px;}
  .nf-nav p{font-size:13px;color:#999;margin-bottom:10px;}

  .nf-nav a{display:inline-block;background:#fff;border:1px solid #f0d9c4;border-radius:30px;padding:8px 18px;font-size:14px;color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.06);transition:background .2s,color .2s;}
  .nf-nav a:hover{background:var(--orange);border-color:var(--orange);color:#fff;}
</style>

<body>
<div class="nf">
  <div class="nf-card">
    <!-- SVG: 迷子になった牛のイラスト -->
    <svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" style="width:260px;max-width:100%;margin:0 auto 12px;display:block;" role="img" aria-label="迷子になった牛のイラスト">
      <!-- 空 -->
      <rect width="320" height="180" fill="#fffbf5" rx="16"/>
      <!-- 地面 -->
      <ellipse cx="160" cy="175" rx="180" ry="40" fill="#d1fae5"/>
      <!-- 道路 -->
      <rect x="130" y="110" width="60" height="70" fill="#e5e7eb" rx="4"/>
      <rect x="156" y="115" width="8" height="12" fill="white" rx="2"/>
      <rect x="156" y="138" width="8" height="12" fill="white" rx="2"/>
      <!-- 道標（？マーク） -->
      <rect x="220" y="68" width="52" height="52" fill="white" stroke="#FF6B35" stroke-width="2.5" rx="8"/>
      <text x="246" y="104" text-anchor="middle" font-size="30" font-weight="900" fill="#FF6B35" font-family="sans-serif">?</text>
      <!-- 道標の支柱 -->
      <rect x="242" y="120" width="8" height="45" fill="#9ca3af" rx="2"/>
      <!-- 牛のボディ -->
      <ellipse cx="88" cy="128" rx="40" ry="26" fill="white" stroke="#6B7280" stroke-width="2"/>
      <!-- 牛の脚 -->
      <rect x="58" y="148" width="8" height="20" fill="white" stroke="#6B7280" stroke-width="1.5" rx="3"/>
      <rect x="72" y="148" width="8" height="20" fill="white" stroke="#6B7280" stroke-width="1.5" rx="3"/>
      <rect x="96" y="148" width="8" height="20" fill="white" stroke="#6B7280" stroke-width="1.5" rx="3"/>
      <rect x="110" y="148" width="8" height="20" fill="white" stroke="#6B7280" stroke-width="1.5" rx="3"/>
      <!-- 牛のしっぽ -->
      <path d="M50,124 Q34,112 38,100 Q40,92 48,95" stroke="#6B7280" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- 牛のスポット -->
      <ellipse cx="84" cy="124" rx="13" ry="9" fill="#1f2937" opacity="0.12"/>
      <ellipse cx="102" cy="132" rx="8" ry="6" fill="#1f2937" opacity="0.12"/>
      <!-- 牛の頭 -->
      <ellipse cx="124" cy="114" rx="20" ry="17" fill="white" stroke="#6B7280" stroke-width="2"/>
      <!-- 牛の耳 -->
      <ellipse cx="108" cy="101" rx="6" ry="9" fill="white" stroke="#6B7280" stroke-width="1.5" transform="rotate(-20,108,101)"/>
      <ellipse cx="140" cy="100" rx="6" ry="9" fill="white" stroke="#6B7280" stroke-width="1.5" transform="rotate(20,140,100)"/>
      <!-- 牛の目 -->
      <circle cx="130" cy="110" r="3.5" fill="#1f2937"/>
      <circle cx="131.5" cy="108.5" r="1" fill="white"/>
      <!-- 牛の鼻 -->
      <ellipse cx="136" cy="120" rx="7" ry="5" fill="#fca5a5"/>
      <circle cx="133.5" cy="120" r="1.5" fill="#e57373"/>
      <circle cx="138.5" cy="120" r="1.5" fill="#e57373"/>
      <!-- 牛の角 -->
      <path d="M114,96 Q108,84 116,82" stroke="#9ca3af" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M134,95 Q138,83 130,81" stroke="#9ca3af" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- 思考バブル（迷子感） -->
      <circle cx="155" cy="78" r="4" fill="#FF6B35" opacity="0.25"/>
      <circle cx="163" cy="66" r="6" fill="#FF6B35" opacity="0.35"/>
      <circle cx="174" cy="54" r="10" fill="#FF6B35" opacity="0.15"/>
      <text x="174" y="58" text-anchor="middle" font-size="12" fill="#FF6B35" font-family="sans-serif">…</text>
    </svg>
    <div class="nf-emoji" aria-hidden="true">🐮💦</div>

  </div>
</div>

</html>
