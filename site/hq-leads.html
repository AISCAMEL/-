<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>リード一覧｜BUYMO 本部</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" type="image/svg+xml" href="assets/img/buymo-favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" />
<link rel="stylesheet" href="assets/css/buymo.css" />
<link rel="stylesheet" href="assets/css/board.css" />
</head>
<body>
<script src="assets/js/auth.js"></script><script>AUTH.guard("hq");</script>
<header class="portal-header">
  <div class="container">
    <a href="portal-login.html" class="logo"><span aria-hidden="true">🐮</span> BUYMO</a>
    <span class="portal-title">本部</span>
    <nav class="portal-nav" id="hqNav"></nav>
    <a href="portal-login.html" class="portal-logout">ログアウト</a>
  </div>
</header>

<main class="portal-main">
  <div class="container">
    <h1>リード一覧</h1>
    <p class="portal-sub">査定申込（リード）の一覧。担当の割り当て・ステージ変更がその場でできます（GAS接続時はSlack通知＆ボードに反映）。</p>

    <div class="filter-bar">
      <input type="search" id="fSearch" placeholder="🔍 名前・ID・電話で検索" />
      <select id="fStage"><option value="">ステージ：すべて</option></select>
      <select id="fStore"><option value="">担当：すべて</option></select>
      <span class="filter-count" id="fCount"></span>
    </div>

    <div class="hq-table-wrap">
      <table class="hq-table">
        <thead><tr><th>案件ID</th><th>お名前</th><th>連絡先</th><th>ジャンル</th><th>担当（加盟店）</th><th>ステージ</th><th>金額</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="assets/js/hq-common.js"></script>
<script src="assets/js/hq-leads.js" defer></script>
</body>
</html>
