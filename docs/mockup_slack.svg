<svg xmlns="http://www.w3.org/2000/svg" width="760" height="640" viewBox="0 0 760 640" font-family="'Noto Sans CJK JP','IPAGothic',sans-serif">
  <rect width="760" height="640" fill="#f4f4f6"/>
  <text x="28" y="34" fill="#1d1c1d" font-size="16" font-weight="800">Slackから対応（イメージ）</text>

  <!-- Slack window -->
  <rect x="24" y="50" width="712" height="566" rx="12" fill="#fff" stroke="#e2e2e4"/>
  <!-- channel header -->
  <rect x="24" y="50" width="712" height="44" rx="12" fill="#3f0e40"/>
  <rect x="24" y="72" width="712" height="22" fill="#3f0e40"/>
  <text x="46" y="79" fill="#fff" font-size="14" font-weight="800"># auc-agent-通知</text>

  <!-- bot message: 相場依頼 -->
  <rect x="44" y="110" width="36" height="36" rx="8" fill="#c9a14a"/><text x="62" y="134" fill="#fff" font-size="14" font-weight="900" text-anchor="middle">バ</text>
  <text x="92" y="126" fill="#1d1c1d" font-size="13" font-weight="800">バイモダイレクト Bot <tspan fill="#9a9a9c" font-weight="400" font-size="11">  10:42</tspan></text>
  <text x="92" y="148" fill="#1d1c1d" font-size="13">📈 相場見積り依頼 QT-4001（買取相場）</text>
  <text x="92" y="168" fill="#1d1c1d" font-size="13">車両：日産 セレナ ハイウェイスター 2019 走行6万km</text>
  <text x="92" y="188" fill="#1d1c1d" font-size="13">連絡方法：メール（h@example.com）</text>
  <text x="92" y="208" fill="#2a64c4" font-size="13">▶ Slackから回答：　/相場回答 QT-4001 金額</text>

  <!-- staff types slash command -->
  <rect x="44" y="236" width="36" height="36" rx="8" fill="#0e1b33"/><text x="62" y="260" fill="#e0bd6a" font-size="13" font-weight="900" text-anchor="middle">吉</text>
  <text x="92" y="252" fill="#1d1c1d" font-size="13" font-weight="800">吉田 一平 <tspan fill="#9a9a9c" font-weight="400" font-size="11">  10:45</tspan></text>
  <rect x="92" y="262" width="360" height="26" rx="6" fill="#eef2f9"/>
  <text x="104" y="280" fill="#0e1b33" font-size="13" font-family="monospace">/相場回答 QT-4001 1280000</text>

  <!-- bot reply -->
  <rect x="44" y="306" width="36" height="36" rx="8" fill="#c9a14a"/><text x="62" y="330" fill="#fff" font-size="14" font-weight="900" text-anchor="middle">バ</text>
  <text x="92" y="322" fill="#1d1c1d" font-size="13" font-weight="800">バイモダイレクト Bot <tspan fill="#9a9a9c" font-weight="400" font-size="11">  10:45</tspan></text>
  <rect x="92" y="332" width="600" height="70" rx="8" fill="#f6f8fc" stroke="#e4e8ef"/>
  <text x="108" y="356" fill="#1f9d6b" font-size="13" font-weight="800">✅ 相場回答を登録（QT-4001）</text>
  <text x="108" y="376" fill="#1a2233" font-size="12">セレナ ハイウェイスター ／ ¥1,280,000（買取相場）</text>
  <text x="108" y="394" fill="#1a2233" font-size="12">→ マイページに反映・メールで自動連絡しました</text>

  <!-- other commands hint -->
  <rect x="44" y="424" width="648" height="86" rx="10" fill="#fff" stroke="#e2e2e4"/>
  <text x="64" y="448" fill="#1d1c1d" font-size="12" font-weight="800">Slackから操作できるコマンド</text>
  <text x="64" y="470" fill="#3a3a3c" font-size="12" font-family="monospace">/相場回答 QT-4001 1280000   …相場をマイページに反映＋メール</text>
  <text x="64" y="488" fill="#3a3a3c" font-size="12" font-family="monospace">/進捗 OD-2041 落札成立        …注文/出品の進捗を更新</text>
  <text x="64" y="506" fill="#3a3a3c" font-size="12" font-family="monospace">/ローン LN-5001 承認          …ローン審査ステータスを更新</text>

  <!-- reflect on mypage -->
  <rect x="44" y="524" width="648" height="74" rx="10" fill="#eaf7f0" stroke="#c4ead6"/>
  <text x="64" y="548" fill="#1f9d6b" font-size="12" font-weight="800">マイページ反映（会員側）</text>
  <text x="64" y="568" fill="#1f9d6b" font-size="12">買取相場：日産 セレナ … <tspan font-weight="800">回答済み ¥1,280,000</tspan>（回答待ち→反映）</text>
  <text x="64" y="586" fill="#5a6675" font-size="11">※ GAS本番デプロイ後に実反映（JSONPで取得）。送信元は自社Googleアカウント。</text>
</svg>
