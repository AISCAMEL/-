<svg xmlns="http://www.w3.org/2000/svg" width="960" height="980" viewBox="0 0 960 980" font-family="'Noto Sans CJK JP','IPAGothic',sans-serif">
  <defs>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0e1b33"/><stop offset="1" stop-color="#16294a"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0bd6a"/><stop offset="1" stop-color="#c9a14a"/></linearGradient>
  </defs>
  <rect width="960" height="980" fill="#f6f8fc"/>

  <!-- Header -->
  <rect width="960" height="56" fill="#0e1b33"/>
  <rect x="32" y="14" width="28" height="28" rx="7" fill="url(#gold)"/><text x="40" y="33" fill="#0e1b33" font-size="16" font-weight="900">バ</text>
  <text x="70" y="33" fill="#fff" font-size="15" font-weight="800">バイモダイレクト</text>
  <text x="860" y="33" fill="#cfd6e6" font-size="12">ログアウト</text>

  <!-- page head -->
  <rect x="0" y="56" width="960" height="74" fill="url(#head)"/>
