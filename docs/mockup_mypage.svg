  <line x1="48" y1="214" x2="236" y2="214" stroke="#e4e8ef"/>
  <g font-size="13" fill="#1a2233">
    <rect x="48" y="226" width="188" height="28" rx="8" fill="#eef2f9"/><text x="62" y="245">📊 ダッシュボード</text>
    <text x="62" y="279">📦 注文・出品状況</text>
    <text x="62" y="309">➕ 購入オーダー</text>
    <text x="62" y="339">🏷️ 出品申込</text>
    <text x="62" y="369" fill="#c9a14a" font-weight="700">🔑 車ひろばログイン</text>
    <text x="62" y="399">📖 出品マニュアル</text>
    <text x="62" y="429">🧮 料金シミュレーション</text>
  </g>

  <!-- 車ひろば panel -->
  <rect x="272" y="154" width="656" height="96" rx="12" fill="#fff" stroke="#c9a14a" stroke-width="2"/>
  <text x="292" y="184" fill="#1a2233" font-size="15" font-weight="800">🔑 購入のやりとり（車ひろば エージェント）</text>
  <text x="292" y="208" fill="#5a6675" font-size="12">ログインID・パスワードは購入お申込み後に発行し、登録メールへご連絡します。</text>
  <rect x="292" y="220" width="220" height="18" rx="4" fill="#e6f0ff"/><text x="300" y="233" fill="#2a64c4" font-size="11">申込後にログイン情報を発行します</text>
  <rect x="740" y="200" width="168" height="34" rx="17" fill="url(#gold)"/><text x="824" y="222" fill="#0e1b33" font-size="12" font-weight="700" text-anchor="middle">車ひろばにログイン →</text>

  <!-- stats -->
  <rect x="272" y="266" width="206" height="70" rx="12" fill="#fff" stroke="#e4e8ef"/><text x="292" y="294" fill="#5a6675" font-size="12">進行中の注文</text><text x="292" y="322" fill="#1a2233" font-size="22" font-weight="900">2</text>
  <rect x="496" y="266" width="206" height="70" rx="12" fill="#fff" stroke="#e4e8ef"/><text x="516" y="294" fill="#5a6675" font-size="12">累計ご成約</text><text x="516" y="322" fill="#1a2233" font-size="22" font-weight="900">1</text>
