  <text x="32" y="116" fill="#b9c4d8" font-size="12">スタンダード会員 ／ 登録日 2026-06-13</text>

  <!-- Sidebar -->
  <rect x="32" y="154" width="220" height="300" rx="12" fill="#fff" stroke="#e4e8ef"/>
