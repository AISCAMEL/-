  <text x="346" y="514" fill="#1a2233" font-size="14" font-weight="800">日産 セレナ ハイウェイスター (2019)</text>
  <rect x="790" y="498" width="120" height="22" rx="11" fill="#e6f0ff"/><text x="850" y="513" fill="#2a64c4" font-size="10" font-weight="700" text-anchor="middle">出品票発送・搬入待ち</text>
  <text x="292" y="534" fill="#5a6675" font-size="11">受付番号 SL-3007 ／ 2026-06-08</text>
  <rect x="292" y="542" width="500" height="7" rx="4" fill="#e4e8ef"/><rect x="292" y="542" width="225" height="7" rx="4" fill="url(#gold)"/>
  <text x="910" y="536" fill="#1a2233" font-size="13" font-weight="800" text-anchor="end">¥1,129,200</text>
  <line x1="272" y1="572" x2="928" y2="572" stroke="#eef0f4"/>
  <!-- order 3 done -->
  <rect x="292" y="586" width="44" height="18" rx="9" fill="#e6f0ff"/><text x="314" y="599" fill="#2a64c4" font-size="10" font-weight="700" text-anchor="middle">購入</text>
  <text x="346" y="600" fill="#1a2233" font-size="14" font-weight="800">ホンダ N-BOX カスタム (2020)</text>
  <rect x="828" y="584" width="82" height="22" rx="11" fill="#eef0f4"/><text x="869" y="599" fill="#5a6675" font-size="10" font-weight="700" text-anchor="middle">納車完了</text>

  <!-- order form -->
  <rect x="272" y="638" width="656" height="312" rx="12" fill="#fff" stroke="#e4e8ef"/>
  <text x="292" y="668" fill="#1a2233" font-size="16" font-weight="800">かんたんオーダー（購入）</text>
  <rect x="292" y="682" width="616" height="28" rx="6" fill="#e6f0ff"/><text x="304" y="700" fill="#2a64c4" font-size="11">条件を入力すると、その場で総額の目安を計算します</text>
  <text x="292" y="734" fill="#5a6675" font-size="12">ご希望の車種・モデル</text>
  <rect x="292" y="744" width="616" height="32" rx="6" fill="#f6f8fc" stroke="#e4e8ef"/><text x="304" y="765" fill="#9aa6b8" font-size="12">例）トヨタ アルファード 2.5 S（2019〜2021年式）</text>
  <text x="292" y="800" fill="#5a6675" font-size="12">落札上限予算</text><rect x="292" y="810" width="296" height="32" rx="6" fill="#f6f8fc" stroke="#e4e8ef"/><text x="304" y="831" fill="#1a2233" font-size="13">¥2,500,000</text>
  <text x="612" y="800" fill="#5a6675" font-size="12">納車先（福島拠点より配送）</text><rect x="612" y="810" width="296" height="32" rx="6" fill="#f6f8fc" stroke="#e4e8ef"/><text x="624" y="831" fill="#1a2233" font-size="13">東京都　▼</text>
  <rect x="292" y="862" width="616" height="40" rx="8" fill="#0e1b33"/><text x="312" y="887" fill="#d4dcec" font-size="13">想定 乗り出し総額</text><text x="888" y="888" fill="#e0bd6a" font-size="20" font-weight="900" text-anchor="end">¥2,657,800</text>
  <rect x="292" y="912" width="616" height="30" rx="8" fill="url(#gold)"/><text x="600" y="932" fill="#0e1b33" font-size="12" font-weight="700" text-anchor="middle">この内容でオーダーを依頼する</text>
</svg>
