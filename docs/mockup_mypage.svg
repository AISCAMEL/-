  <text x="346" y="428" fill="#1a2233" font-size="14" font-weight="800">トヨタ ヤリス 1.5 G (2021)</text>
  <rect x="800" y="412" width="110" height="22" rx="11" fill="#e6f0ff"/><text x="855" y="427" fill="#2a64c4" font-size="10" font-weight="700" text-anchor="middle">陸送・手続き中</text>
  <text x="292" y="448" fill="#5a6675" font-size="11">受付番号 OD-2041 ／ 2026-06-02</text>
  <rect x="292" y="456" width="500" height="7" rx="4" fill="#e4e8ef"/><rect x="292" y="456" width="375" height="7" rx="4" fill="url(#gold)"/>
  <text x="910" y="450" fill="#1a2233" font-size="13" font-weight="800" text-anchor="end">¥1,614,000</text>
  <line x1="272" y1="486" x2="928" y2="486" stroke="#eef0f4"/>
  <!-- order 2 sell -->
