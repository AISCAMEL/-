  <rect x="800" y="364" width="110" height="26" rx="13" fill="url(#gold)"/><text x="855" y="381" fill="#0e1b33" font-size="11" font-weight="700" text-anchor="middle">＋ 新規オーダー</text>
  <line x1="272" y1="400" x2="928" y2="400" stroke="#eef0f4"/>
  <!-- order 1 -->
