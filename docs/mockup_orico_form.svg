    <!-- 5 -->
    <rect x="32" y="650" width="716" height="22" fill="#eef2f9"/><text x="40" y="665" font-weight="800" fill="#0e1b33">5. 連帯保証人（必要な場合）</text>
    <line x1="32" y1="672" x2="748" y2="672" stroke="#e4e8ef"/>
