    <rect x="32" y="98" width="716" height="22" fill="#eef2f9"/><text x="40" y="113" font-weight="800" fill="#0e1b33">1. お申込者情報</text>
    <line x1="32" y1="120" x2="748" y2="120" stroke="#e4e8ef"/>
    <text x="40" y="140">お名前（漢字）：吉田 一平</text><text x="420" y="140">フリガナ：________</text>
