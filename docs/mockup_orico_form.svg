    <text x="40" y="398">健康保険：社保・国保・組合・共済・その他</text>

    <!-- 3 -->
    <rect x="32" y="414" width="716" height="22" fill="#fdf7e8"/><text x="40" y="429" font-weight="800" fill="#0e1b33">3. お支払い条件（記入済）</text>
