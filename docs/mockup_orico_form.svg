    <text x="40" y="732">勤務先：________</text><text x="420" y="732">年収：____円</text>

    <!-- 6 -->
    <rect x="32" y="748" width="716" height="22" fill="#eef2f9"/><text x="40" y="763" font-weight="800" fill="#0e1b33">6. ご確認・同意</text>
    <line x1="32" y1="770" x2="748" y2="770" stroke="#e4e8ef"/>
  </g>
  <text x="40" y="792" font-size="10.5" fill="#5a6675">・本申込に関する個人情報を、株式会社オリエントコーポレーション（オリコ）および加盟店が、与信・契約の判断</text>
  <text x="40" y="808" font-size="10.5" fill="#5a6675">　および個人信用情報機関への登録・利用のために取り扱うことに同意します。</text>
  <text x="40" y="824" font-size="10.5" fill="#5a6675">・記載内容に相違ありません。</text>
  <text x="40" y="858" font-size="12" fill="#1a2233">申込日：____________　　ご署名：____________________　㊞</text>

  <rect x="32" y="884" width="716" height="120" rx="8" fill="#f6f8fc" stroke="#e4e8ef"/>
  <text x="48" y="908" font-size="11" font-weight="800" fill="#0e1b33">自動化の流れ</text>
  <text x="48" y="930" font-size="11" fill="#5a6675">① 会員がローン仮申込（月々目安・AI一次判定）</text>
  <text x="48" y="950" font-size="11" fill="#5a6675">② 裏で本申込書（PDF）を顧客情報から自動生成</text>
  <text x="48" y="970" font-size="11" fill="#5a6675">③ ご登録メールへ自動送付 → ④ 記入・返送 → ⑤ オリコへ正式審査依頼</text>
  <text x="48" y="992" font-size="10" fill="#8a93a4">※ 最終様式・項目はオリコ指定の正式申込書に準拠（様式があれば差し替え可）。</text>
</svg>
