    <line x1="32" y1="298" x2="748" y2="298" stroke="#e4e8ef"/>
    <text x="40" y="318">勤務先名：________</text><text x="420" y="318">電話：________</text>
    <text x="40" y="338">所在地：〒________　________________</text>
    <text x="40" y="358">雇用形態：正社員・公務員</text><text x="420" y="358">業種・職種：________</text>
