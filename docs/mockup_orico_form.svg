<svg xmlns="http://www.w3.org/2000/svg" width="780" height="1040" viewBox="0 0 780 1040" font-family="'Noto Sans CJK JP','IPAGothic',sans-serif">
  <rect width="780" height="1040" fill="#fff"/>
  <rect x="0" y="0" width="780" height="64" fill="#0e1b33"/>
  <text x="32" y="32" fill="#fff" font-size="17" font-weight="800">オリコ オートローン クレジット申込書</text>
  <text x="32" y="52" fill="#e0bd6a" font-size="11">（個別信用購入あっせん）　受付番号 LN-5001／加盟店：合同会社アイズ（AUC-AGENT）</text>
  <text x="32" y="84" fill="#5a6675" font-size="11">※ 取得済み情報は記入済み。空欄（____）はお客様記入・押印のうえご返送ください。</text>

