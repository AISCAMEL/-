  <rect class="blk" x="1078" y="170" width="110" height="44" rx="6"/><rect class="blk" x="1198" y="170" width="110" height="44" rx="6"/><rect class="cta" x="1318" y="170" width="120" height="44" rx="6"/><text class="ctaT" x="1330" y="196">想定売上</text><rect class="blk" x="1448" y="170" width="156" height="44" rx="6"/>
