    <rect class="blk" x="56" y="866" width="348" height="44" rx="6"/><text class="tb" x="68" y="893">買取実績（※イメージ）</text>
    <rect class="blk" x="56" y="918" width="348" height="44" rx="6"/><text class="tb" x="68" y="945">FAQ（アコーディオン）</text>

    <rect class="cta" x="56" y="970" width="348" height="70" rx="6"/><text class="tb" x="68" y="994">査定フォーム（同意チェック）</text><rect class="nav" x="68" y="1004" width="324" height="26" rx="13" fill="#FF6B35"/><text class="tw" x="180" y="1022">査定を依頼</text>

    <rect class="blk" x="56" y="1048" width="348" height="34" rx="6"/><text class="t" x="68" y="1070">サービスエリア / 会社情報 / 信頼バッジ</text>
    <rect class="nav" x="56" y="1090" width="348" height="46" rx="6"/><text class="tw" x="120" y="1118">会員CTA＋フッター（紺）</text>
