<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1660 1200" width="1660" height="1200" font-family="'Noto Sans JP',sans-serif">
  <rect width="1660" height="1200" fill="#F3F4F6"/>
  <text x="40" y="44" font-size="24" font-weight="900" fill="#333">BUYMO レイアウトワイヤー（主要画面）</text>
  <text x="40" y="68" font-size="13" fill="#888">低精細レイアウト図。グレー＝セクション枠、橙＝CTA/重要要素。実装はこの構成に沿っています。</text>

  <defs>
    <style>
      .win{fill:#fff;stroke:#cfcfcf;stroke-width:1.5;}
      .bar{fill:#eceff3;}
      .blk{fill:#eaecef;stroke:#dadde2;stroke-width:1;}
      .blk2{fill:#f4f6f8;stroke:#e2e5ea;stroke-width:1;}
      .cta{fill:#FFE3D2;stroke:#FF6B35;stroke-width:1.2;}
      .nav{fill:#1E3A8A;}
      .t{font-size:12px;fill:#555;}
      .tb{font-size:13px;font-weight:700;fill:#333;}
      .tw{font-size:12px;fill:#fff;}
      .cap{font-size:14px;font-weight:900;fill:#1E3A8A;}
      .ctaT{font-size:12px;font-weight:700;fill:#FF6B35;}
      .mut{font-size:10px;fill:#9aa;}
    </style>
