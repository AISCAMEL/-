    <rect class="cta" x="68" y="220" width="150" height="26" rx="13"/><text class="ctaT" x="86" y="238">無料査定はこちら</text>
    <rect class="blk2" x="300" y="178" width="92" height="68" rx="6"/><text class="mut" x="316" y="216">車/🐮画像</text>

    <rect class="nav" x="56" y="266" width="348" height="40" rx="6"/><text class="tw" x="120" y="291">数字バンド 0円/即日/47</text>

    <rect class="blk" x="56" y="314" width="348" height="86" rx="6"/><text class="tb" x="68" y="338">査定シミュレーター</text><text class="t" x="68" y="360">クラス/年式/距離/状態→概算</text><rect class="cta" x="68" y="368" width="130" height="22" rx="11"/><text class="ctaT" x="84" y="384">概算をみる</text>

    <rect class="blk" x="56" y="408" width="348" height="60" rx="6"/><text class="tb" x="68" y="432">4大特長（カード×4）</text><rect class="blk2" x="68" y="440" width="74" height="20"/><rect class="blk2" x="150" y="440" width="74" height="20"/><rect class="blk2" x="232" y="440" width="74" height="20"/><rect class="blk2" x="314" y="440" width="78" height="20"/>

    <rect class="blk" x="56" y="476" width="348" height="44" rx="6"/><text class="tb" x="68" y="503">お取引の流れ（4ステップ）</text>
