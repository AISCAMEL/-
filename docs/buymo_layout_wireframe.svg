  <g>
    <rect class="blk" x="1078" y="272" width="120" height="254" rx="6"/><text class="tb" x="1088" y="292">新規受付</text><rect class="cta" x="1086" y="300" width="104" height="40" rx="5"/><rect class="blk2" x="1086" y="346" width="104" height="40" rx="5"/>
    <rect class="blk" x="1206" y="272" width="120" height="254" rx="6"/><text class="tb" x="1216" y="292">査定中</text><rect class="blk2" x="1214" y="300" width="104" height="40" rx="5"/>
