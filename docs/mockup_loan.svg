<svg xmlns="http://www.w3.org/2000/svg" width="760" height="620" viewBox="0 0 760 620" font-family="'Noto Sans CJK JP','IPAGothic',sans-serif">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0bd6a"/><stop offset="1" stop-color="#c9a14a"/></linearGradient>
  </defs>
  <rect width="760" height="620" fill="#f6f8fc"/>

  <!-- panel -->
  <rect x="24" y="24" width="712" height="572" rx="14" fill="#fff" stroke="#e4e8ef"/>
  <rect x="24" y="24" width="712" height="48" rx="14" fill="#fff"/>
  <text x="48" y="55" fill="#1a2233" font-size="17" font-weight="800">オートローン仮申込（オリコ）</text>
  <line x1="24" y1="72" x2="736" y2="72" stroke="#eef0f4"/>

  <!-- info -->
  <rect x="48" y="88" width="664" height="40" rx="8" fill="#e6f0ff"/>
  <text x="64" y="106" fill="#2a64c4" font-size="12">月々のお支払い目安をその場で計算。仮申込後、AI一次判定 →</text>
  <text x="64" y="122" fill="#2a64c4" font-size="12">信販会社（オリコ等）へ審査を依頼します（事務手数料は無料）。</text>

  <!-- row1 -->
  <text x="48" y="158" fill="#5a6675" font-size="12">ローン希望額</text>
  <text x="360" y="158" fill="#c9a14a" font-size="12" font-weight="700" text-anchor="end">¥1,500,000</text>
  <rect x="48" y="166" width="312" height="34" rx="6" fill="#f6f8fc" stroke="#e4e8ef"/><text x="62" y="188" fill="#1a2233" font-size="13">¥1,500,000</text>
  <text x="400" y="158" fill="#5a6675" font-size="12">支払回数</text>
  <rect x="400" y="166" width="312" height="34" rx="6" fill="#f6f8fc" stroke="#e4e8ef"/><text x="414" y="188" fill="#1a2233" font-size="13">36回（3年）　▼</text>

  <!-- row2 -->
  <text x="48" y="228" fill="#5a6675" font-size="12">実質年率（目安）</text>
  <rect x="48" y="236" width="312" height="34" rx="6" fill="#f6f8fc" stroke="#e4e8ef"/><text x="62" y="258" fill="#1a2233" font-size="13">6.9%　▼</text>
  <text x="400" y="228" fill="#5a6675" font-size="12">雇用形態</text>
  <rect x="400" y="236" width="312" height="34" rx="6" fill="#f6f8fc" stroke="#e4e8ef"/><text x="414" y="258" fill="#1a2233" font-size="13">正社員・公務員　▼</text>

  <!-- income -->
  <text x="48" y="298" fill="#5a6675" font-size="12">年収（万円）</text>
  <rect x="48" y="306" width="664" height="34" rx="6" fill="#f6f8fc" stroke="#e4e8ef"/><text x="62" y="328" fill="#1a2233" font-size="13">400</text>

  <!-- result -->
  <rect x="48" y="360" width="664" height="150" rx="10" fill="#fff" stroke="#e4e8ef"/>
  <text x="64" y="392" fill="#1a2233" font-size="13">月々のお支払い（目安）</text>
  <text x="696" y="392" fill="#1a2233" font-size="16" font-weight="800" text-anchor="end">¥46,247 /月</text>
  <line x1="64" y1="406" x2="696" y2="406" stroke="#eef0f4"/>
  <text x="64" y="430" fill="#5a6675" font-size="13">支払総額／うち利息</text>
  <text x="696" y="430" fill="#5a6675" font-size="13" text-anchor="end">¥1,664,892（利息 ¥164,892）</text>
  <rect x="64" y="446" width="632" height="48" rx="10" fill="#0e1b33"/>
  <text x="84" y="476" fill="#d4dcec" font-size="13">AI一次判定（目安）</text>
  <text x="676" y="478" fill="#e0bd6a" font-size="20" font-weight="900" text-anchor="end">A（即日審査へ）</text>

  <!-- button -->
  <rect x="48" y="528" width="664" height="44" rx="22" fill="url(#gold)"/>
  <text x="380" y="556" fill="#0e1b33" font-size="14" font-weight="700" text-anchor="middle">この内容でローンを仮申込する</text>
</svg>
