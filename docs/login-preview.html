<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カーメル ログイン画面プレビュー</title>
<style>
body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#f4f6fb}
/* ↓ プラグインの [carmel_login] と同一スタイル */
.carmel-login-wrap{--carmel-brand:#1a1a2e;--carmel-accent:#2e86de;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5em 1em;
  background:radial-gradient(120% 120% at 50% 0%, rgba(46,134,222,.10) 0%, rgba(26,26,46,.04) 45%, transparent 70%);font-size:14px}
.carmel-login-card{width:100%;max-width:400px;background:#fff;border:1px solid #e7eaf0;border-radius:1em;
  box-shadow:0 12px 40px rgba(26,26,46,.12);padding:2.4em 2em}
.carmel-login-brand{text-align:center;margin-bottom:1.6em}
.carmel-login-wordmark{font-size:2em;font-weight:800;letter-spacing:.18em;color:var(--carmel-brand)}
.carmel-login-tagline{margin:.5em 0 0;color:#7a8090;font-size:.85em}
.carmel-login-title{text-align:center;font-size:1.1em;color:var(--carmel-brand);margin:0 0 1.2em;position:relative}
.carmel-login-title:after{content:"";display:block;width:40px;height:3px;border-radius:3px;background:var(--carmel-accent);margin:.6em auto 0}
.login-username,.login-password{display:flex;flex-direction:column;gap:.35em;margin-bottom:1em;font-weight:600;color:#3a3f4b;font-size:.9em}
.carmel-login-card input[type=text],.carmel-login-card input[type=password]{border:1.5px solid #d9dee7;border-radius:.55em;padding:.75em .8em;font-weight:normal;font-size:1em}
.carmel-login-card input:focus{border-color:var(--carmel-accent);outline:none;box-shadow:0 0 0 3px rgba(46,134,222,.15)}
.login-remember{font-weight:normal;font-size:.85em;color:#666;margin-bottom:1em}
.login-submit input{width:100%;background:var(--carmel-accent);color:#fff;border:0;border-radius:.55em;padding:.85em;font-size:1em;font-weight:700;cursor:pointer}
.carmel-login-links{text-align:center;margin-top:1.1em;font-size:.85em}
.carmel-login-links a{color:var(--carmel-accent);text-decoration:none}
.carmel-login-note{font-size:.78em;color:#9298a5;margin-top:1.4em;text-align:center;line-height:1.6}
.carmel-login-footer{color:#aab;font-size:.75em;margin-top:1.4em;text-align:center}
</style>
</head>
<body>
<div class="carmel-login-wrap">
  <div class="carmel-login-card">
    <div class="carmel-login-brand">
      <span class="carmel-login-wordmark">CARMEL</span>
      <p class="carmel-login-tagline">クルマのことは、カーメルにおまかせ。</p>
    </div>
    <h2 class="carmel-login-title">ログイン</h2>
    <form>
      <p class="login-username"><label>メールアドレス または ユーザー名</label><input type="text"></p>
      <p class="login-password"><label>パスワード</label><input type="password"></p>
      <p class="login-remember"><label><input type="checkbox"> ログイン状態を保持</label></p>
      <p class="login-submit"><input type="submit" value="ログイン"></p>
    </form>
    <div class="carmel-login-links"><a href="#">パスワードをお忘れですか？</a></div>
    <p class="carmel-login-note">お申込み済みの方は、受付時にお送りしたメール／LINEのリンクからパスワードを設定してください。</p>
  </div>
  <p class="carmel-login-footer">© 2026 CARMEL</p>
</div>
</body>
</html>
