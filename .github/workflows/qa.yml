name: QA

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  link-check:
    name: 内部リンク健全性チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run link/asset checker
        working-directory: site
        run: node tools/check-links.js
      - name: Run SEO / structured-data / consistency checker
        working-directory: site
        run: node tools/seo-check.js
